name: Build

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        working-directory: src-tauri
        run: npm ci

      - name: Build Windows installer
        working-directory: src-tauri
        run: npm run build -- --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: taniman-windows
          path: src-tauri/target/release/bundle/nsis/
          retention-days: 90

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            target: aarch64-apple-darwin
            lipo_arch: arm64
            artifact_name: taniman-macos-arm64-unsigned
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            lipo_arch: x86_64
            artifact_name: taniman-macos-x64-unsigned
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        working-directory: src-tauri
        run: npm ci

      - name: Build macOS DMG
        working-directory: src-tauri
        run: npm run build -- --target ${{ matrix.target }} --bundles dmg

      - name: Verify macOS architecture
        working-directory: src-tauri
        shell: bash
        run: |
          set -euo pipefail
          app_bundle="$(find target -type d -path '*/release/bundle/macos/Taniman.app' -print -quit)"
          if [ -z "$app_bundle" ]; then
            echo "::error title=Missing macOS app bundle::Could not find Taniman.app under src-tauri/target."
            find target -maxdepth 5 -type d -print
            exit 1
          fi

          executable_name="$(plutil -extract CFBundleExecutable raw "$app_bundle/Contents/Info.plist")"
          executable="$app_bundle/Contents/MacOS/$executable_name"

          if [ ! -x "$executable" ]; then
            echo "::error title=Missing macOS executable::Expected executable at $executable."
            find "$app_bundle/Contents" -maxdepth 3 -print
            exit 1
          fi

          actual_arch="$(lipo -archs "$executable")"
          if [ "$actual_arch" != "${{ matrix.lipo_arch }}" ]; then
            echo "::error title=Wrong macOS architecture::Expected ${{ matrix.lipo_arch }}, got $actual_arch."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/**/release/bundle/dmg/*.dmg
          retention-days: 90
